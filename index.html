<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de EPIs e Uniformes</title>

  <!-- Favicon -->
  <link rel="icon" type="image/ico" href="icone lsg.ico" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <!-- Tailwind Theme Extension -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#1a1a2e',
            surface: '#16213e',
            panel: '#0f3460',
            accent: '#e94560',
            mint: '#53d8a8',
            warn: '#f5a623',
            light: '#e8e8e8',
          },
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            mono: ['Space Mono', 'monospace'],
          },
        }
      }
    }
  </script>

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />

  <!-- Seu CSS Custom (extraído do index2.html) -->
  <link rel="stylesheet" href="style.css" />
  
  <!-- Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

</head>

<body class="bg-ink text-light">

  <!-- Top Bar -->
  <div class="top-bar">
    <img src="logo lsg.png" alt="LSG Sky Chefs" style="height:36px;width:auto;object-fit:contain;">
  </div>

  <!-- App -->
  <div id="app">
    
    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
      <div class="w-full max-w-md mx-4 fade-in">

        <!-- Header -->
        <div class="text-center mb-12">
          <h1 class="text-3xl font-bold mb-2">Controle de EPIs e Uniformes</h1>
          <p class="text-light/50">Sistema de Gerenciamento de Segurança</p>
        </div>

        <!-- Setores -->
        <div class="space-y-3 mb-8">

          <!-- RH -->
          <button onclick="selectSetor('RH')" class="w-full group">
            <div class="relative overflow-hidden rounded-xl border-2 border-panel hover:border-accent transition-all duration-300 p-6 bg-surface group-hover:bg-surface/80 card-hover">
              <div class="absolute inset-0 bg-gradient-to-br from-accent/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
              <div class="relative flex items-center gap-4">
                <div class="w-14 h-14 rounded-lg bg-blue-500/20 flex items-center justify-center group-hover:scale-110 transition-transform">
                  <i data-lucide="users" class="w-7 h-7 text-blue-400"></i>
                </div>
                <div class="text-left flex-1">
                  <h3 class="font-bold text-lg">RH - Uniformes</h3>
                  <p class="text-sm text-light/50">Uniformes e Calçados de Segurança</p>
                </div>
                <i data-lucide="arrow-right" class="w-5 h-5 text-light/30 group-hover:text-accent group-hover:translate-x-1 transition-all"></i>
              </div>
            </div>
          </button>

          <!-- SEGURANÇA -->
          <button onclick="selectSetor('Segurança')" class="w-full group">
            <div class="relative overflow-hidden rounded-xl border-2 border-panel hover:border-mint transition-all duration-300 p-6 bg-surface group-hover:bg-surface/80 card-hover">
              <div class="absolute inset-0 bg-gradient-to-br from-mint/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
              <div class="relative flex items-center gap-4">
                <div class="w-14 h-14 rounded-lg bg-mint/20 flex items-center justify-center group-hover:scale-110 transition-transform">
                  <i data-lucide="hard-hat" class="w-7 h-7 text-mint"></i>
                </div>
                <div class="text-left flex-1">
                  <h3 class="font-bold text-lg">Segurança - EPIs</h3>
                  <p class="text-sm text-light/50">Equipamentos de Proteção Individual</p>
                </div>
                <i data-lucide="arrow-right" class="w-5 h-5 text-light/30 group-hover:text-mint group-hover:translate-x-1 transition-all"></i>
              </div>
            </div>
          </button>

        </div>

        <!-- Admin -->
        <div class="border-t border-panel pt-6">
          <button onclick="selectSetor('admin')" class="w-full group">
            <div class="relative overflow-hidden rounded-xl border-2 border-panel hover:border-warn transition-all duration-300 p-4 bg-surface/50 group-hover:bg-surface/80 card-hover">
              <div class="relative flex items-center gap-3 justify-center">
                <i data-lucide="settings" class="w-5 h-5 text-warn group-hover:rotate-90 transition-transform"></i>
                <span class="font-medium text-warn">Visualizar Todos os Setores (Admin)</span>
              </div>
            </div>
          </button>
        </div>

        <!-- Footer -->
        <div class="text-center mt-8 text-xs text-light/30">
          <p>Sistema integrado com Google Sheets</p>
          <p class="mt-1">v1.0 - Controle Integrado</p>
        </div>

      </div>
    </div>

    <!-- Toasts -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="fixed inset-x-0 bottom-0 bg-ink flex items-center justify-center z-50" style="display:none;">
      <div class="text-center">
        <div class="loading-spinner mx-auto mb-4"></div>
        <p class="text-light/70" id="loadingText">Carregando...</p>
      </div>
    </div>

    <!-- AQUI VOCÊ CONTINUA COM TODO O RESTANTE DO index2.html ORIGINAL -->
    <!-- COMO SEU ARQUIVO É MUITO GRANDE, ESTA É A VERSÃO ESTRUTURAL -->
    <!-- AGORA É SÓ COLAR TODO O BLOCO DE PÁGINAS (dashboard, estoque, modais, scripts JS etc.) EXATAMENTE COMO NO index2.html -->

  </div>

  <!-- Script Principal (cole todo o JS original aqui) -->
  <script>
    /* TODO O SEU SCRIPT ORIGINAL VAI AQUI */
  </script>

  <script>
    lucide.createIcons();
  </script>

</body>
</html>
